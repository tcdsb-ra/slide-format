title: slides
version: 1.0.0
quarto-required: ">=1.8.0"

contributes:
  formats:
    revealjs:
      logo: logo.svg
      embed-resources: true
      fig-format: svg
      transition: fade
      code-fold: true
      theme: [default, tcdsb_revealjs.scss]
      css: tcdsb_extras.css
      title-slide-attributes:
        data-background-image: title_slide_background.png

